name: CI - Tests et Validation

on: [push, pull_request]

jobs:
  test:
    name: Tests & Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python -c "import sys; print(sys.version)"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8 (optional)
        run: |
          pip install flake8
          # stop the build if there are Python syntax errors or undefined names
          flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings
          flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Run pytest tests
        run: |
          if [ -d tests ]; then 
            echo "🧪 Running tests..."
            pytest tests/ -v --tb=short --junit-xml=test-results.xml
          fi

      - name: Upload test results
      
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml

      - name: Check if best_model.joblib exists
        run: |
          if [ -f artifacts/best_model.joblib ] || [ -f artifacts/rf.joblib ]; then
            echo "✅ Model artifacts found"
          else
            echo "⚠️ Warning: Model artifacts not found (need to run training)"
          fi

  summary:
    name: Build Summary
    runs-on: ubuntu-latest
    if: always()
    needs: test

    steps:
      - name: Build Success
        if: needs.test.result == 'success'
        run: echo "✅ All checks passed!"

      - name: Build Failure
        if: needs.test.result == 'failure'
        run: |
          echo "❌ Build failed"
          exit 1